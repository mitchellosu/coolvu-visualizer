<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>CoolVu LMS</title><style>:root{font-family:Inter,system-ui,-apple-system,Segoe UI,sans-serif;color:#17201b;background:#f6f7f4}*{box-sizing:border-box}body{margin:0;background:#f6f7f4}button,input{font:inherit}button{border:0;border-radius:6px;background:#1c7c54;color:white;cursor:pointer;font-weight:800;min-height:42px;padding:10px 14px}button:disabled{background:#a4ada8;cursor:not-allowed}.secondary{background:#e7ece8;color:#17201b}.top{background:#10231a;color:white;display:flex;justify-content:space-between;gap:16px;padding:16px 28px}.top span{color:#b9c8bf;font-size:13px}.wrap{max-width:1120px;margin:auto;padding:28px}.login{display:grid;place-items:center;min-height:100vh;padding:24px}.card{background:white;border:1px solid #dfe5df;border-radius:8px;box-shadow:0 18px 70px #17201b1f}.login .card{max-width:440px;width:100%;padding:28px}h1{font-size:30px;line-height:1.12;margin:0 0 8px}p{line-height:1.5;color:#62706a}.field{display:grid;gap:7px;margin-top:18px}.field label{font-size:13px;font-weight:800}.field input{border:1px solid #dfe5df;border-radius:6px;min-height:44px;padding:10px 12px}.err{background:#fee4e2;border:1px solid #fecdca;border-radius:6px;color:#b42318;margin-top:16px;padding:10px}.ok{background:#ecfdf3;border:1px solid #abefc6;border-radius:6px;color:#167a4a;margin-top:16px;padding:10px}.grid{display:grid;gap:18px;grid-template-columns:1.6fr .8fr;margin-top:24px}.list,.side,.lesson{background:white;border:1px solid #dfe5df;border-radius:8px}.row{align-items:center;border-bottom:1px solid #dfe5df;display:grid;gap:18px;grid-template-columns:46px 1fr auto;padding:18px}.row:last-child{border-bottom:0}.idx{align-items:center;background:#edf3ef;border-radius:50%;display:flex;font-weight:900;height:42px;justify-content:center;width:42px}.done .idx{background:#d1fadf;color:#167a4a}.locked{color:#a4ada8}.row h2{font-size:18px;margin:0 0 5px}.badges{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px}.badge{background:#edf3ef;border-radius:999px;color:#62706a;font-size:12px;font-weight:800;padding:5px 9px}.badge.okb{background:#d1fadf;color:#167a4a}.badge.warn{background:#fef0c7;color:#93370d}.side{align-self:start;padding:18px}.stat{border-top:1px solid #dfe5df;display:flex;justify-content:space-between;padding:12px 0}.lesson{overflow:hidden}.head{border-bottom:1px solid #dfe5df;padding:22px}.body{display:grid;gap:22px;padding:22px}.video{aspect-ratio:16/9;background:#0b1711;border:0;border-radius:6px;width:100%}.content{color:#243029;line-height:1.65}.content h2{font-size:20px;margin:24px 0 8px}.quiz{border-top:1px solid #dfe5df;display:grid;gap:18px;padding-top:18px}.q{background:#fbfcfa;border:1px solid #dfe5df;border-radius:8px;padding:16px}.choice{display:flex;gap:9px;margin:10px 0}.actions{display:flex;flex-wrap:wrap;gap:10px;margin-top:20px}@media(max-width:820px){.grid{grid-template-columns:1fr}.row{grid-template-columns:40px 1fr}.row button{grid-column:1/-1}.top{flex-direction:column}.wrap{padding:18px}}</style></head><body><div id="app"></div><script>const USERS=[['aremi@coolvu.local','welcome123','Aremi'],['mitchell@coolvu.local','welcome123','Mitchell']];const MODULES=[{id:'basics',t:'CoolVu Basics',d:'Learn what CoolVu sells, who we serve, and the problems we solve.',v:'https://www.youtube.com/embed/dQw4w9WgXcQ',c:'## What CoolVu Does\n\nCoolVu of McKinney installs residential and commercial window film. We specialize in homes and businesses, not auto tint. Flat glass has different needs, risks, and expectations.\n\n## Common Problems\n\n- Heat from direct sun\n- Glare on TVs and work spaces\n- Daytime privacy\n- Fading floors and furniture\n- Security or safety concerns\n- Decorative privacy\n\n## Customer Feeling\n\nCustomers should feel heard, educated, and guided.',q:[['What does CoolVu focus on?',['Auto tint only','Home and commercial window film','Roofing'],1],['Which problem does window film solve?',['Heat and glare','Foundation cracks','Lawn drainage'],0],['Customers should feel...',['Rushed','Heard, educated, and guided','Ignored'],1]]},{id:'lead-intake',t:'Front Desk and Lead Intake',d:'Learn the first-response flow for new leads and missed calls.',v:'https://www.youtube.com/embed/dQw4w9WgXcQ',c:'## Goal\n\nRespond quickly, understand the problem, and move qualified leads toward a free consultation.\n\n## First Questions\n\n- Are you mostly trying to solve heat, glare, privacy, or fading?\n- Which room or side of the house is the issue?\n- Are these large windows or standard windows?\n\n## Booking\n\nDo not end with let me know. Offer choices: I have Tuesday afternoon or Thursday morning available. Which works better?',q:[['First goal of lead intake?',['Ask for payment','Respond quickly and understand the problem','Send to voicemail'],1],['Best first question?',['What is your budget?','Heat, glare, privacy, or fading?','Do you want the most expensive film?'],1],['Avoid saying...',['Which works better?','Tuesday or Thursday?','Let me know'],2]]},{id:'privacy',t:'Privacy and Warranty Scripts',d:'Learn trust-building explanations around privacy and glass warranty.',v:'https://www.youtube.com/embed/dQw4w9WgXcQ',c:'## Daytime Privacy\n\nWindow film works well for daytime privacy because outside is brighter than inside. At night, when lights are on inside, people can still see in. For nighttime privacy, frosted or decorative film may be better.\n\n## Warranty\n\nModern residential glass can have warranty considerations. If a question gets technical, escalate to Mitchell.\n\n## Tone\n\nBe transparent. Clear limitations build trust.',q:[['Daytime privacy works best when...',['Outside is brighter','Inside lights are on at night','It is raining'],0],['Nighttime privacy option?',['Frosted/decorative film','Roof inspection','Auto tint'],0],['Technical warranty question?',['Guess','Escalate to Mitchell','Ignore'],1]]},{id:'tintwiz',t:'Scheduling and TintWiz Hygiene',d:'Learn how to keep customer info, appointments, and next steps organized.',v:'https://www.youtube.com/embed/dQw4w9WgXcQ',c:'## Why It Matters\n\nTintWiz and the calendar keep track of customers, consultations, installs, invoices, and follow-ups. If notes are messy, Mitchell becomes the router again.\n\n## Consultation Scheduling\n\nFor straightforward residential consultations, use approved time options and confirm clearly.\n\n## Install Scheduling\n\nInstall scheduling affects film ordering, Bobby, and the customer experience. Review with Mitchell until fully trained.',q:[['Clean TintWiz notes help...',['Understand status and next step','Replace all calls','Only marketing'],0],['Install scheduling affects...',['Film ordering and installer schedule','Nothing','Only colors'],0],['Good notes show...',['Problem, status, next step','Favorite color','Weather'],0]]},{id:'escalation',t:'Escalation Rules',d:'Learn when to pause and ask Mitchell before replying.',v:'https://www.youtube.com/embed/dQw4w9WgXcQ',c:'## Escalate Immediately\n\nEscalate customer anger, refunds, bad review risk, technical uncertainty, discounts, payment disputes, scope changes, film changes, install reschedules, Bobby schedule uncertainty, commercial paperwork, or anything that could affect trust.\n\n## Safe With Templates\n\n- Simple residential lead response\n- Missed-call text\n- Basic discovery\n- Consultation scheduling\n- Appointment confirmation\n\n## Rule\n\nSpeed matters, but customer trust matters more.',q:[['Escalate immediately?',['Simple confirmation','Customer asks for discount','Customer says thanks'],1],['Safe with template?',['Refund request','Bad review threat','Simple residential first response'],2],['When uncertain, prioritize...',['Guessing','Customer trust','Changing scope'],1]]}];const $=s=>document.querySelector(s);let user=JSON.parse(localStorage.cvLmsUser||'null'),prog=JSON.parse(localStorage.cvLmsProg||'{}');function esc(x){return String(x).replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;').replaceAll('"','&quot;')}function save(){localStorage.cvLmsProg=JSON.stringify(prog)}function md(t){let h='',ul=0;t.split('\n').forEach(l=>{l=esc(l);if(l.startsWith('## ')){if(ul){h+='</ul>';ul=0}h+='<h2>'+l.slice(3)+'</h2>'}else if(l.startsWith('- ')){if(!ul){h+='<ul>';ul=1}h+='<li>'+l.slice(2)+'</li>'}else if(!l.trim()){if(ul){h+='</ul>';ul=0}}else{if(ul){h+='</ul>';ul=0}h+='<p>'+l+'</p>'}});return h+(ul?'</ul>':'')}function shell(x){app.innerHTML='<header class="top"><div><strong>CoolVu LMS</strong><br><span>Internal training for CoolVu of McKinney</span></div><div><span>'+esc(user?.name||'')+'</span> <button class="secondary" onclick="logout()">Log out</button></div></header><main class="wrap">'+x+'</main>'}function logout(){localStorage.removeItem('cvLmsUser');user=null;login()}function login(e=''){app.innerHTML='<div class="login"><form class="card" id="f"><h1>CoolVu LMS</h1><p>Employee training for scripts, SOPs, products, and customer workflows.</p>'+(e?'<div class="err">'+esc(e)+'</div>':'')+'<div class="field"><label>Email</label><input name="email" value="aremi@coolvu.local"></div><div class="field"><label>Password</label><input name="password" type="password" value="welcome123"></div><div class="actions"><button>Log in</button></div></form></div>';f.onsubmit=ev=>{ev.preventDefault();let d=new FormData(f),u=USERS.find(u=>u[0]==d.get('email').trim().toLowerCase()&&u[1]==d.get('password'));if(!u)return login('Invalid email or password');user={email:u[0],name:u[2]};localStorage.cvLmsUser=JSON.stringify(user);dash()}}function unlocked(){let s=new Set;for(let m of MODULES){s.add(m.id);if(!prog[m.id]?.done)break}return s}function dash(){let u=unlocked(),done=MODULES.filter(m=>prog[m.id]?.done).length,next=MODULES.find(m=>!prog[m.id]?.done&&u.has(m.id));let rows=MODULES.map((m,i)=>{let p=prog[m.id]||{},lock=!u.has(m.id);return '<article class="row '+(p.done?'done ':'')+(lock?'locked':'')+'"><div class="idx">'+(p.done?'✓':i+1)+'</div><div><h2>'+esc(m.t)+'</h2><p>'+esc(m.d)+'</p><div class="badges">'+(p.done?'<span class="badge okb">Complete</span>':'')+(lock?'<span class="badge">Locked</span>':'<span class="badge warn">Unlocked</span>')+(p.best!=null?'<span class="badge">Best score: '+p.best+'%</span>':'')+'</div></div><button '+(lock?'disabled':'')+' onclick="lesson(\''+m.id+'\')">'+(p.done?'Review':'Start')+'</button></article>'}).join('');shell('<section><h1>Employee Dashboard</h1><p>Complete modules in order. Score 80% or higher on each quiz to unlock the next training.</p></section><section class="grid"><div class="list">'+rows+'</div><aside class="side"><h2>Progress</h2><div class="stat"><span>Completed</span><strong>'+done+'/'+MODULES.length+'</strong></div><div class="stat"><span>Next module</span><strong>'+esc(next?.t||'All done')+'</strong></div><div class="stat"><span>Passing score</span><strong>80%</strong></div><p>This public preview saves progress in this browser. The backend version stores progress centrally.</p></aside></section>')}function lesson(id,result){let m=MODULES.find(x=>x.id==id);if(!unlocked().has(id))return dash();let p=prog[id]||{};let qs=m.q.map((q,i)=>'<section class="q"><h3>'+(i+1)+'. '+esc(q[0])+'</h3>'+q[1].map((c,j)=>'<label class="choice"><input type="radio" name="q'+i+'" value="'+j+'"><span>'+esc(c)+'</span></label>').join('')+'</section>').join('');shell('<article class="lesson"><div class="head"><button class="secondary" onclick="dash()">Back to dashboard</button><h1>'+esc(m.t)+'</h1><p>'+esc(m.d)+'</p><div class="badges">'+(p.done?'<span class="badge okb">Complete</span>':'<span class="badge warn">In progress</span>')+(p.best!=null?'<span class="badge">Best score: '+p.best+'%</span>':'')+'</div></div><div class="body"><iframe class="video" src="'+esc(m.v)+'" allowfullscreen></iframe><section class="content">'+md(m.c)+'</section><form class="quiz" id="quiz"><h2>Quiz</h2><p>Score 80% or higher to complete this module.</p>'+qs+(result?'<div class="'+(result.pass?'ok':'err')+'">Score: '+result.score+'%. '+(result.pass?'Passed. Next module unlocked.':'You need 80% to pass. Try again.')+'</div>':'')+'<div class="actions"><button>Submit Quiz</button><button type="button" class="secondary" onclick="dash()">Dashboard</button></div></form></div></article>');quiz.onsubmit=e=>{e.preventDefault();let correct=0;m.q.forEach((q,i)=>{let a=document.querySelector('input[name=q'+i+']:checked');if(a&&+a.value==q[2])correct++});let score=Math.round(correct/m.q.length*100),pass=score>=80,old=prog[id]||{attempts:[]};prog[id]={done:old.done||pass,best:Math.max(old.best||0,score),completedAt:old.completedAt||(pass?new Date().toISOString():null),attempts:[...(old.attempts||[]),{score,pass,at:new Date().toISOString()}]};save();lesson(id,{score,pass})}}user?dash():login();</script></body></html>
